<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#sheen)"/>

  <!-- Microphone (voice) -->
  <g fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- capsule -->
    <rect x="440" y="196" width="144" height="252" rx="72" fill="#ffffff" stroke="none"/>
    <!-- cradle -->
    <path d="M 372 420 A 140 140 0 0 0 652 420"/>
    <!-- stem -->
    <line x1="512" y1="560" x2="512" y2="612"/>
  </g>

  <!-- Prompt caret "›_" (prompt) -->
  <g fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="452,648 512,700 452,752"/>
    <line x1="556" y1="752" x2="656" y2="752"/>
  </g>
</svg>
